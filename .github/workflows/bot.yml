name: VBB Bot

permissions:
  contents: write   # wichtig, damit data.json gespeichert werden kann

on:
  schedule:
    - cron: '*/5 * * * *' # alle 5 Minuten UTC
  workflow_dispatch:      # manuell starten möglich

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        
      - name: Commit data.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data.json"
          git push || true
