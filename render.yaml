services:
  - type: worker          # Kein Webserver – nur ein Hintergrund-Prozess
    name: vbb-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: VBB_ACCESS_ID
        sync: false       # wird manuell im Render-Dashboard eingetragen
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
